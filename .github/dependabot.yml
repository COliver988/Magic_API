# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "nuget" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "monthly"
  - package-ecosystem: "dotnet-sdk" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "dotnet"
        versions: [ "9.x" ]
      - dependency-name: "EntityFramework"
        versions: ["9.x"]
      - dependency-name: "EntityFrameworkCore.PostgreSQL"
        versions: ["9.x"]
      - dependency-name: "EntityFrameworkCore.SqlServer"
        versions: ["9.x"]
      - dependency-name: "Microsoft.EntityFrameworkCore.SqlServer"
        versions: ["9.x"]
      - dependency-name: "AspNetCore.HealthChecks.SqlServer"
        versions: ["9.x"]
